<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freshr Studios — Buffalo's Story Studio</title>
    <meta name="description" content="Freshr Studios is Buffalo's boutique video and photography production studio. We capture authentic stories from the city and its diaspora." />

    <!-- Time-based theme: light 6am–8pm, dark 8pm–6am -->
    <!-- Random accent color per session -->
    <script>
      (function () {
        var h = new Date().getHours();
        document.documentElement.setAttribute(
          'data-theme',
          h >= 6 && h < 20 ? 'light' : 'dark'
        );

        var palette = [
          '252 158 79',  /* orange  */
          '198 241 53',  /* acid    */
          '196 30 58',   /* red     */
          '0 71 171',    /* cobalt  */
          '124 58 237',  /* violet  */
        ];
        var pick = palette[Math.floor(Math.random() * palette.length)];
        document.documentElement.style.setProperty('--rgb-accent', pick);
      })();
    </script>

    <!-- Google Fonts: Bebas Neue (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
